<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Productivity Guard</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <span class="title">Productivity Guard</span>
    <div class="header-right">
      <label class="master-toggle" title="拡張機能のオン/オフ">
        <input type="checkbox" id="master-enabled" checked />
        <span class="master-slider"></span>
      </label>
      <a href="stats.html" target="_blank" class="stats-link">統計 &rsaquo;</a>
    </div>
  </div>

  <div class="section" id="main-section">
    <!-- Dynamically populated by popup.js -->
  </div>

  <div class="section settings-section">
    <div class="section-title">Settings</div>
    <div id="settings-rows">
      <!-- Dynamically populated by popup.js -->
    </div>
    <div class="setting-row">
      <label class="setting-label">開く前に確認</label>
      <label class="toggle-label">
        <input type="checkbox" id="confirm-enabled" />
        有効
      </label>
    </div>
    <button id="save-btn" class="save-btn">保存</button>
    <span id="save-msg" class="save-msg"></span>
  </div>

  <div class="section add-site-section">
    <div class="section-title">サイト管理</div>
    <div class="add-site-row">
      <input type="text" id="new-site-url" placeholder="例: instagram.com" class="url-input" />
      <input type="number" id="new-site-limit" value="20" min="1" max="1440" class="limit-input" />
      <span class="unit">min</span>
      <button id="add-site-btn" class="add-btn">追加</button>
    </div>
    <div id="custom-sites-list">
      <!-- Dynamically populated by popup.js -->
    </div>
    <div id="add-site-error" class="add-site-error"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
